<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <style>
        html, body, #map { width:100%; height:100%; padding:0; margin:0; }
        .info h2 { font-size: 1rem; margin: 0 0 4px; }
        /* Elimina líneas blancas entre tiles (escala mínima para solapar) */
        .leaflet-tile-container img,
        .leaflet-tile { will-change: transform; outline: 1px solid transparent; }
        .leaflet-tile-container { transform: scale(1.001); transform-origin: 0 0; }
        /* ── Buscador de municipios ── */
        #muni-search-panel{position:absolute;top:10px;left:50px;z-index:1000;background:rgba(255,255,255,.96);border:1px solid #c8dcc8;border-radius:8px;box-shadow:0 2px 12px rgba(10,30,15,.18);padding:7px 9px;display:flex;align-items:center;gap:6px;font-family:Arial,Helvetica,sans-serif;backdrop-filter:blur(6px)}
        #muni-search-input{border:1px solid #c8dcc8;border-radius:5px;padding:6px 9px;font-size:13px;font-family:inherit;outline:none;min-width:170px;color:#1e3322}
        #muni-search-input:focus{border-color:#2e9650;box-shadow:0 0 0 2px rgba(46,150,80,.15)}
        #muni-search-clear{border:none;background:#eef4ef;color:#4a6450;width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        #muni-search-clear:hover{background:#d2e0d2;color:#1a5c30}
        @media(max-width:600px){#muni-search-panel{left:10px;right:10px;top:10px}#muni-search-input{min-width:0;flex:1}}
        /* ── Etiquetas de municipios (discretas) ── */
        .muni-label{background:rgba(255,255,255,.6)!important;border:none!important;box-shadow:none!important;color:#5a0707!important;font-family:Arial,Helvetica,sans-serif!important;font-size:9px!important;font-weight:700!important;letter-spacing:.02em;padding:0 2px!important;border-radius:2px;text-shadow:0 1px 2px rgba(255,255,255,.8)}
        .muni-label::before{display:none!important}
        /* ── Desplegable personalizado del buscador ── */
        #muni-search-panel{position:relative}
        #muni-dropdown{position:absolute;top:calc(100% + 4px);left:9px;right:9px;background:#fff;border:1px solid #c8dcc8;border-radius:6px;box-shadow:0 6px 20px rgba(10,30,15,.2);max-height:238px;overflow-y:auto;display:none;z-index:1100}
        #muni-dropdown.open{display:block}
        .muni-opt{padding:8px 11px;font-size:13px;color:#1e3322;cursor:pointer;font-family:Arial,Helvetica,sans-serif;border-bottom:1px solid #f0f4f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .muni-opt:last-child{border-bottom:none}
        .muni-opt:hover,.muni-opt.active{background:#eef4ef;color:#1a5c30}
        #muni-dropdown::-webkit-scrollbar{width:8px}
        #muni-dropdown::-webkit-scrollbar-thumb{background:#2e9650;border-radius:4px}
        #muni-dropdown::-webkit-scrollbar-track{background:#f0f4f0}
        </style>
        <title>Resultados</title>
    </head>
    <body>
        <div id="map"></div>
        <div id="muni-search-panel">
          <input id="muni-search-input" placeholder="Buscar municipio…" autocomplete="off">
          <button id="muni-search-clear" title="Limpiar" aria-label="Limpiar">✕</button>
          <div id="muni-dropdown"></div>
        </div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/multi-style-layer.js"></script>
        <script src="js/leaflet-svg-shape-markers.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="data/Clasificacin_1.js"></script>
        <script src="data/Propuestaubicacinresortdeportivo_2.js"></script>
        <script src="data/Municipios_3.js"></script>
        <script src="data/Tarragons_4.js"></script>

        <script>
        /* ══════════════════════════════════════════════
           SISTEMA DE TRADUCCIÓN DEL MAPA
           Lee el idioma del localStorage de la web padre
           ══════════════════════════════════════════════ */
        var T = {
            es: {
                title:        'Resultados',
                layerTagona:  'Tarragonés',
                layerMuni:    'Municipios',
                layerResort:  'Propuesta ubicación resort deportivo',
                baseSat:      'Satélite',
                baseLight:    'Mapa claro',
                baseEsri:     'Satélite Esri',
                baseDark:     'Mapa oscuro',
                layerClasif:  'Clasificación',
                noApto:       'No apto',
                aptBaja:      'Aptitud baja',
                aptMedia:     'Aptitud media',
                aptAlta:      'Aptitud alta',
                aptMuyAlta:   'Aptitud muy alta',
                /* popup Clasificación */
                superficie:   'Superficie',
                idoneidad:    'Idoneidad',
                precio:       'Precio',
                /* popup Municipios */
                codimuni:     'Código municipio',
                nommuni:      'Municipio',
                km2:          'km²',
                /* popup Tarragonés */
                comarca:      'Comarca',
                poblacion:    'Población',
            },
            en: {
                title:        'Results',
                layerTagona:  'Tarragonès',
                layerMuni:    'Municipalities',
                layerResort:  'Proposed sports resort location',
                baseSat:      'Satellite',
                baseLight:    'Light map',
                baseEsri:     'Esri Satellite',
                baseDark:     'Dark map',
                layerClasif:  'Classification',
                noApto:       'Not suitable',
                aptBaja:      'Low suitability',
                aptMedia:     'Medium suitability',
                aptAlta:      'High suitability',
                aptMuyAlta:   'Very high suitability',
                superficie:   'Area',
                idoneidad:    'Suitability',
                precio:       'Price',
                codimuni:     'Municipality code',
                nommuni:      'Municipality',
                km2:          'km²',
                comarca:      'Region',
                poblacion:    'Population',
            },
            ca: {
                title:        'Resultats',
                layerTagona:  'Tarragonès',
                layerMuni:    'Municipis',
                layerResort:  'Proposta ubicació resort esportiu',
                baseSat:      'Satèl·lit',
                baseLight:    'Mapa clar',
                baseEsri:     'Satèl·lit Esri',
                baseDark:     'Mapa fosc',
                layerClasif:  'Classificació',
                noApto:       'No apte',
                aptBaja:      'Aptitud baixa',
                aptMedia:     'Aptitud mitjana',
                aptAlta:      'Aptitud alta',
                aptMuyAlta:   'Aptitud molt alta',
                superficie:   'Superfície',
                idoneidad:    'Idoneïtat',
                precio:       'Preu',
                codimuni:     'Codi municipi',
                nommuni:      'Municipi',
                km2:          'km²',
                comarca:      'Comarca',
                poblacion:    'Població',
            },
            fr: {
                title:        'Résultats',
                layerTagona:  'Tarragonès',
                layerMuni:    'Communes',
                layerResort:  'Emplacement proposé pour le resort sportif',
                baseSat:      'Satellite',
                baseLight:    'Carte claire',
                baseEsri:     'Satellite Esri',
                baseDark:     'Carte sombre',
                layerClasif:  'Classification',
                noApto:       'Non adapté',
                aptBaja:      'Aptitude faible',
                aptMedia:     'Aptitude moyenne',
                aptAlta:      'Aptitude élevée',
                aptMuyAlta:   'Aptitude très élevée',
                superficie:   'Superficie',
                idoneidad:    'Adéquation',
                precio:       'Prix',
                codimuni:     'Code commune',
                nommuni:      'Commune',
                km2:          'km²',
                comarca:      'Région',
                poblacion:    'Population',
            }
        };

        /* ══ Diccionario de VALORES del GeoJSON ════════════════
           Traduce el contenido de los campos (no solo etiquetas).
           La clave es el valor original (catalán) tal cual está
           en los datos. Números y nombres propios no se incluyen.
        ════════════════════════════════════════════════════════ */
        var V_t = {
            /* Campo layer / aptitud */
            'Aptitud alta':      {es:'Aptitud alta',          ca:'Aptitud alta',          en:'High suitability',        fr:'Aptitude élevée'},
            'Aptitud baixa':     {es:'Aptitud baja',          ca:'Aptitud baixa',         en:'Low suitability',         fr:'Aptitude faible'},
            'Aptitud mitjana':   {es:'Aptitud media',         ca:'Aptitud mitjana',       en:'Medium suitability',      fr:'Aptitude moyenne'},
            'Aptitud molt alta': {es:'Aptitud muy alta',      ca:'Aptitud molt alta',     en:'Very high suitability',   fr:'Aptitude très élevée'},
            'No apte':           {es:'No apto',               ca:'No apte',               en:'Not suitable',            fr:'Non adapté'},
            /* Campo Idonïetat / idoneidad */
            'Superficie insuficient':                              {es:'Superficie insuficiente',                       ca:'Superfície insuficient',                          en:'Insufficient area',                          fr:'Superficie insuffisante'},
            'Superficie suficient amb bona capacitat expansió':   {es:'Superficie suficiente con buena capacidad de expansión',  ca:'Superfície suficient amb bona capacitat expansió',  en:'Sufficient area with good expansion capacity',  fr:'Superficie suffisante avec bonne capacité d\'expansion'},
            'Superficie suficient amb molta capacitat expansió':  {es:'Superficie suficiente con mucha capacidad de expansión',  ca:'Superfície suficient amb molta capacitat expansió', en:'Sufficient area with high expansion capacity',  fr:'Superficie suffisante avec grande capacité d\'expansion'},
            'Superficie suficient amb poca capacitat expansió':   {es:'Superficie suficiente con poca capacidad de expansión',   ca:'Superfície suficient amb poca capacitat expansió',  en:'Sufficient area with low expansion capacity',   fr:'Superficie suffisante avec faible capacité d\'expansion'},
            'Superficie suficient sense capacitat expansió':      {es:'Superficie suficiente sin capacidad de expansión',        ca:'Superfície suficient sense capacitat expansió',     en:'Sufficient area without expansion capacity',    fr:'Superficie suffisante sans capacité d\'expansion'},
            /* Campo Comarca */
            'Tarragonés':        {es:'Tarragonès',            ca:'Tarragonès',            en:'Tarragonès',              fr:'Tarragonès'},
            /* Campo Preu / precio — valor sin precio público */
            'Descongeut':        {es:'Privado',               ca:'Privat',                en:'Private',                 fr:'Privé'},
            'Desconegut':        {es:'Privado',               ca:'Privat',                en:'Private',                 fr:'Privé'}
        };

        /* Traduce un valor si está en el diccionario; si no, lo deja igual */
        function tVal(v) {
            if (v === null || v === undefined) return '';
            var key = String(v);
            if (V_t[key] && V_t[key][currentLang]) return V_t[key][currentLang];
            return key;
        }

        function getLang() {
            try { return localStorage.getItem('ebregis_lang') || 'es'; }
            catch(e) { return 'es'; }
        }
        var currentLang = getLang();
        var L_t = T[currentLang] || T.es;  /* traducciones activas */

        /* ══ Mapa ══════════════════════════════════════════════ */
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).setView([41.1598, 1.2950], 11);

        var hash = new L.Hash(map);
        map.attributionControl.setPrefix(
            '<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a>' +
            ' &middot; <a href="https://leafletjs.com">Leaflet</a>' +
            ' &middot; <a href="https://qgis.org">QGIS</a>'
        );
        var autolinker = new Autolinker({truncate:{length:30,location:'smart'}});
        var bounds_group = new L.featureGroup([]);
        function setBounds() {}

        /* ══ Capa 0: Satélite ══════════════════════════════════ */
        map.createPane('pane_GoogleSatelliteHybrid_0');
        map.getPane('pane_GoogleSatelliteHybrid_0').style.zIndex = 400;
        var layer_GoogleSatelliteHybrid_0 = L.tileLayer(
            'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
            { pane:'pane_GoogleSatelliteHybrid_0', opacity:1.0,
              minZoom:1, maxZoom:28, minNativeZoom:0, maxNativeZoom:19 }
        );
        map.addLayer(layer_GoogleSatelliteHybrid_0);

        /* ══ Capa 0b: CartoDB Positron (fondo claro) ═══════════ */
        map.createPane('pane_CartoPositron_0b');
        map.getPane('pane_CartoPositron_0b').style.zIndex = 399;
        var layer_CartoPositron_0b = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
            { pane:'pane_CartoPositron_0b', opacity:1.0,
              attribution:'&copy; OpenStreetMap, &copy; CARTO',
              subdomains:'abcd', minZoom:1, maxZoom:20, maxNativeZoom:20 }
        );

        /* ══ Capa 0c: Esri World Imagery (satélite alternativo) ═ */
        map.createPane('pane_EsriImagery_0c');
        map.getPane('pane_EsriImagery_0c').style.zIndex = 398;
        var layer_EsriImagery_0c = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            { pane:'pane_EsriImagery_0c', opacity:1.0,
              attribution:'&copy; Esri, Maxar, Earthstar Geographics',
              minZoom:1, maxZoom:28, maxNativeZoom:19 }
        );

        /* ══ Capa 0d: CartoDB Dark Matter (fondo oscuro) ═══════ */
        map.createPane('pane_CartoDark_0d');
        map.getPane('pane_CartoDark_0d').style.zIndex = 397;
        var layer_CartoDark_0d = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            { pane:'pane_CartoDark_0d', opacity:1.0,
              attribution:'&copy; OpenStreetMap, &copy; CARTO',
              subdomains:'abcd', minZoom:1, maxZoom:20, maxNativeZoom:20 }
        );

        /* ══ Capa 1: Clasificación ═════════════════════════════ */
        function pop_Clasificacin_1(feature, layer) {
            var p = feature.properties;
            var popupContent = '<table>' +
                '<tr><td colspan="2"><b>' + tVal(p['layer'] || '') + '</b></td></tr>' +
                '<tr><th>' + L_t.superficie + '</th><td>' + (p['Superficie'] !== null ? autolinker.link(String(p['Superficie'])) : '') + '</td></tr>' +
                '<tr><th>' + L_t.idoneidad  + '</th><td>' + (p['Idonïetat'] !== null ? tVal(p['Idonïetat']) : '') + '</td></tr>' +
                '<tr><th>' + L_t.precio     + '</th><td>' + (p['Preu'] !== null ? tVal(p['Preu']) : '') + '</td></tr>' +
                '</table>';
            layer.bindPopup(popupContent, {maxHeight:400});
        }

        /* Mapeo de valores de datos (en catalán original) → clave de traducción */
        var clasifMap = {
            'No apte':        'noApto',
            'Aptitud baixa':  'aptBaja',
            'Aptitud mitjana':'aptMedia',
            'Aptitud alta':   'aptAlta',
            'Aptitud molt alta':'aptMuyAlta',
            /* por si los datos están en español */
            'No apto':        'noApto',
            'Aptitud baja':   'aptBaja',
            'Aptitud media':  'aptMedia',
            'Aptitud muy alta':'aptMuyAlta',
        };

        function style_Clasificacin_1_0(feature) {
            var colors = {
                noApto:      'rgba(255,245,240,0.753)',
                aptBaja:     'rgba(253,204,184,0.753)',
                aptMedia:    'rgba(252,143,111,0.753)',
                aptAlta:     'rgba(244,77,56,0.753)',
                aptMuyAlta:  'rgba(116,0,4,0.753)',
            };
            var key = clasifMap[String(feature.properties['layer'])] || 'noApto';
            return {
                pane:'pane_Clasificacin_1', stroke:false, fill:true,
                fillOpacity:1, fillColor:colors[key], interactive:true
            };
        }
        map.createPane('pane_Clasificacin_1');
        map.getPane('pane_Clasificacin_1').style.zIndex = 401;
        map.getPane('pane_Clasificacin_1').style['mix-blend-mode'] = 'normal';
        var layer_Clasificacin_1 = new L.geoJson(json_Clasificacin_1, {
            attribution:'', interactive:true,
            dataVar:'json_Clasificacin_1', layerName:'layer_Clasificacin_1',
            pane:'pane_Clasificacin_1',
            onEachFeature: pop_Clasificacin_1,
            style: style_Clasificacin_1_0,
        });
        bounds_group.addLayer(layer_Clasificacin_1);
        map.addLayer(layer_Clasificacin_1);

        /* ══ Capa 2: Propuesta resort ══════════════════════════ */
        function pop_Propuestaubicacinresortdeportivo_2(feature, layer) {
            var popupContent = '<table><tr><td colspan="2">' +
                (feature.properties['id'] !== null ? autolinker.link(String(feature.properties['id'])) : '') +
                '</td></tr></table>';
            layer.bindPopup(popupContent, {maxHeight:400});
        }
        function style_Propuestaubicacinresortdeportivo_2_0() {
            return { pane:'pane_Propuestaubicacinresortdeportivo_2', radius:17.6,
                opacity:1, color:'rgba(250,139,57,1.0)', dashArray:'', lineCap:'butt',
                lineJoin:'miter', weight:4.0, fill:true, fillOpacity:1,
                fillColor:'rgba(255,255,255,1.0)', interactive:false };
        }
        function style_Propuestaubicacinresortdeportivo_2_1() {
            return { pane:'pane_Propuestaubicacinresortdeportivo_2', radius:7.2,
                opacity:1, color:'rgba(250,176,124,1.0)', dashArray:'', lineCap:'butt',
                lineJoin:'miter', weight:1.0, fill:true, fillOpacity:1,
                fillColor:'rgba(250,176,124,1.0)', interactive:false };
        }
        map.createPane('pane_Propuestaubicacinresortdeportivo_2');
        map.getPane('pane_Propuestaubicacinresortdeportivo_2').style.zIndex = 402;
        map.getPane('pane_Propuestaubicacinresortdeportivo_2').style['mix-blend-mode'] = 'normal';
        var layer_Propuestaubicacinresortdeportivo_2 = new L.geoJson.multiStyle(
            json_Propuestaubicacinresortdeportivo_2, {
            attribution:'', interactive:false,
            dataVar:'json_Propuestaubicacinresortdeportivo_2',
            layerName:'layer_Propuestaubicacinresortdeportivo_2',
            pane:'pane_Propuestaubicacinresortdeportivo_2',
            onEachFeature: pop_Propuestaubicacinresortdeportivo_2,
            pointToLayers: [
                function(feature,latlng){ return L.shapeMarker(latlng, style_Propuestaubicacinresortdeportivo_2_0(feature)); },
                function(feature,latlng){ return L.shapeMarker(latlng, style_Propuestaubicacinresortdeportivo_2_1(feature)); },
            ]
        });
        bounds_group.addLayer(layer_Propuestaubicacinresortdeportivo_2);
        map.addLayer(layer_Propuestaubicacinresortdeportivo_2);

        /* ══ Capa 3: Municipios ════════════════════════════════ */
        function pop_Municipios_3(feature, layer) {
            var p = feature.properties;
            var popupContent = '<table>' +
                '<tr><th>' + L_t.codimuni  + '</th><td>' + (p['CODIMUNI'] !== null ? autolinker.link(String(p['CODIMUNI'])) : '') + '</td></tr>' +
                '<tr><th>' + L_t.nommuni   + '</th><td>' + (p['NOMMUNI']  !== null ? autolinker.link(String(p['NOMMUNI']))  : '') + '</td></tr>' +
                '<tr><th>' + L_t.km2       + '</th><td>' + (p['km2']      !== null ? autolinker.link(String(p['km2']))      : '') + '</td></tr>' +
                '</table>';
            layer.bindPopup(popupContent, {maxHeight:400});
            /* Etiqueta permanente discreta con el nombre del municipio */
            if(feature.properties && feature.properties.NOMMUNI){
                layer.bindTooltip(feature.properties.NOMMUNI,{permanent:true,direction:'center',className:'muni-label'});
            }
        }
        function style_Municipios_3_0() {
            return { pane:'pane_Municipios_3', opacity:1, color:'rgba(101,7,7,1.0)',
                dashArray:'', lineCap:'square', lineJoin:'bevel',
                weight:2.0, fillOpacity:0, interactive:true };
        }
        map.createPane('pane_Municipios_3');
        map.getPane('pane_Municipios_3').style.zIndex = 403;
        map.getPane('pane_Municipios_3').style['mix-blend-mode'] = 'normal';
        var layer_Municipios_3 = new L.geoJson(json_Municipios_3, {
            attribution:'', interactive:true,
            dataVar:'json_Municipios_3', layerName:'layer_Municipios_3',
            pane:'pane_Municipios_3',
            onEachFeature: pop_Municipios_3,
            style: style_Municipios_3_0,
        });
        bounds_group.addLayer(layer_Municipios_3);
        map.addLayer(layer_Municipios_3);

        /* ══ Capa 4: Tarragonés ════════════════════════════════ */
        function pop_Tarragons_4(feature, layer) {
            var p = feature.properties;
            var popupContent = '<table>' +
                '<tr><th>' + L_t.comarca   + '</th><td>' + (p['Comarca']   !== null ? tVal(p['Comarca'])   : '') + '</td></tr>' +
                '<tr><th>' + L_t.km2       + '</th><td>' + (p['km2']       !== null ? autolinker.link(String(p['km2']))       : '') + '</td></tr>' +
                '<tr><th>' + L_t.poblacion + '</th><td>' + (p['Poblacion'] !== null ? autolinker.link(String(p['Poblacion'])) : '') + '</td></tr>' +
                '</table>';
            layer.bindPopup(popupContent, {maxHeight:400});
        }
        function style_Tarragons_4_0() {
            return { pane:'pane_Tarragons_4', opacity:1, color:'rgba(228,26,28,1.0)',
                dashArray:'', lineCap:'square', lineJoin:'bevel',
                weight:4.0, fillOpacity:0, interactive:true };
        }
        map.createPane('pane_Tarragons_4');
        map.getPane('pane_Tarragons_4').style.zIndex = 404;
        map.getPane('pane_Tarragons_4').style['mix-blend-mode'] = 'normal';
        var layer_Tarragons_4 = new L.geoJson(json_Tarragons_4, {
            attribution:'', interactive:true,
            dataVar:'json_Tarragons_4', layerName:'layer_Tarragons_4',
            pane:'pane_Tarragons_4',
            onEachFeature: pop_Tarragons_4,
            style: style_Tarragons_4_0,
        });
        bounds_group.addLayer(layer_Tarragons_4);
        map.addLayer(layer_Tarragons_4);

        /* ══ Título del mapa (desactivado) ═════════════════════ */
        // var titleControl = new L.Control({position:'topleft'});
        // titleControl.onAdd = function(map) {
        //     this._div = L.DomUtil.create('div', 'info');
        //     this._div.innerHTML = '<h2 id="map-title">' + L_t.title + '</h2>';
        //     return this._div;
        // };
        // titleControl.addTo(map);

        /* ══ Control de capas con leyenda traducida ════════════ */
        function buildLayerControl() {
            var clasifLegend =
                L_t.layerClasif + '<br>' +
                '<table>' +
                '<tr><td style="text-align:center"><img src="legend/Clasificacin_1_Noapto0.png"/></td><td>' + L_t.noApto     + '</td></tr>' +
                '<tr><td style="text-align:center"><img src="legend/Clasificacin_1_Aptitudbaja1.png"/></td><td>' + L_t.aptBaja   + '</td></tr>' +
                '<tr><td style="text-align:center"><img src="legend/Clasificacin_1_Aptitudmedia2.png"/></td><td>' + L_t.aptMedia  + '</td></tr>' +
                '<tr><td style="text-align:center"><img src="legend/Clasificacin_1_Aptitudalta3.png"/></td><td>' + L_t.aptAlta   + '</td></tr>' +
                '<tr><td style="text-align:center"><img src="legend/Clasificacin_1_Aptitudmuyalta4.png"/></td><td>' + L_t.aptMuyAlta + '</td></tr>' +
                '</table>';

            return {
                ['<img src="legend/Tarragons_4.png"/> ' + L_t.layerTagona]: layer_Tarragons_4,
                ['<img src="legend/Municipios_3.png"/> ' + L_t.layerMuni]:  layer_Municipios_3,
                ['<img src="legend/Propuestaubicacinresortdeportivo_2.png"/> ' + L_t.layerResort]: layer_Propuestaubicacinresortdeportivo_2,
                [clasifLegend]: layer_Clasificacin_1,
                [L_t.baseSat]: layer_GoogleSatelliteHybrid_0,
                [L_t.baseEsri]: layer_EsriImagery_0c,
                [L_t.baseLight]: layer_CartoPositron_0b,
                [L_t.baseDark]: layer_CartoDark_0d,
            };
        }

        var layerControl = L.control.layers({}, buildLayerControl()).addTo(map);
        setBounds();

        /* ══ Buscador de municipios (desplegable propio + zoom) ════ */
        (function(){
          var input=document.getElementById('muni-search-input');
          var dropdown=document.getElementById('muni-dropdown');
          var clearBtn=document.getElementById('muni-search-clear');
          if(!input||!dropdown||!layer_Municipios_3)return;
          var muniIndex={};var names=[];
          layer_Municipios_3.eachLayer(function(lyr){
            if(lyr.feature&&lyr.feature.properties){
              var nm=lyr.feature.properties.NOMMUNI;
              if(nm){muniIndex[nm.toLowerCase()]=lyr;names.push(nm);}
            }
          });
          names.sort(function(a,b){return a.localeCompare(b,'ca');});
          var activeIdx=-1,visible=[];
          function goTo(name){
            if(!name)return;
            var lyr=muniIndex[String(name).toLowerCase().trim()];
            if(lyr&&lyr.getBounds){map.flyToBounds(lyr.getBounds(),{padding:[40,40],maxZoom:14,duration:.8});}
          }
          function renderList(filter){
            filter=(filter||'').toLowerCase().trim();
            visible=names.filter(function(n){return n.toLowerCase().indexOf(filter)!==-1;});
            if(visible.length===0){dropdown.classList.remove('open');return;}
            dropdown.innerHTML=visible.map(function(n,i){return '<div class="muni-opt" data-i="'+i+'">'+n+'</div>';}).join('');
            dropdown.classList.add('open');
            activeIdx=-1;
            Array.prototype.forEach.call(dropdown.querySelectorAll('.muni-opt'),function(el){
              el.addEventListener('click',function(){
                input.value=visible[+el.getAttribute('data-i')];
                dropdown.classList.remove('open');
                goTo(input.value);
                input.blur();
              });
            });
          }
          input.addEventListener('focus',function(){renderList(input.value);});
          input.addEventListener('input',function(){renderList(input.value);});
          input.addEventListener('keydown',function(e){
            var opts=dropdown.querySelectorAll('.muni-opt');
            if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,opts.length-1);}
            else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);}
            else if(e.key==='Enter'){e.preventDefault();if(activeIdx>=0&&visible[activeIdx]){input.value=visible[activeIdx];}dropdown.classList.remove('open');goTo(input.value);input.blur();return;}
            else if(e.key==='Escape'){dropdown.classList.remove('open');input.blur();return;}
            else return;
            opts.forEach(function(o,i){o.classList.toggle('active',i===activeIdx);if(i===activeIdx)o.scrollIntoView({block:'nearest'});});
          });
          /* Cerrar al hacer clic fuera */
          document.addEventListener('click',function(e){
            if(!document.getElementById('muni-search-panel').contains(e.target))dropdown.classList.remove('open');
          });
          clearBtn.addEventListener('click',function(){
            input.value='';dropdown.classList.remove('open');setBounds();
          });
          window.updateMuniPlaceholder=function(){
            var ph={es:'Buscar municipio…',ca:'Cerca municipi…',en:'Search municipality…',fr:'Rechercher commune…'};
            input.placeholder=ph[currentLang]||ph.es;
          };
          window.updateMuniPlaceholder();
        })();

        /* ══ Regenera los popups con el idioma actual ══════════
           Los popups se vincularon al cargar con bindPopup. Al
           cambiar de idioma hay que volver a ejecutarlos para que
           usen las nuevas etiquetas de L_t.
        ════════════════════════════════════════════════════════ */
        function refreshPopups() {
            var pairs = [
                [layer_Clasificacin_1, pop_Clasificacin_1],
                [layer_Propuestaubicacinresortdeportivo_2, pop_Propuestaubicacinresortdeportivo_2],
                [layer_Municipios_3, pop_Municipios_3],
                [layer_Tarragons_4, pop_Tarragons_4]
            ];
            pairs.forEach(function(pair) {
                var lyr = pair[0], popFn = pair[1];
                if (!lyr || !popFn) return;
                lyr.eachLayer(function(sub) {
                    if (sub.feature) {
                        /* Si el popup está abierto, lo cerramos para evitar contenido viejo */
                        if (sub.isPopupOpen && sub.isPopupOpen()) sub.closePopup();
                        sub.unbindPopup();
                        popFn(sub.feature, sub);
                    }
                });
            });
        }

        /* ══ Escucha cambios de idioma desde la web padre ══════
           La web principal guarda el idioma en localStorage.
           Aquí escuchamos el evento storage para actualizarlo
           sin recargar la página.
        ════════════════════════════════════════════════════════ */
        window.addEventListener('storage', function(e) {
            if (e.key !== 'ebregis_lang') return;
            var newLang = e.newValue || 'es';
            if (newLang === currentLang) return;
            currentLang = newLang;
            L_t = T[currentLang] || T.es;

            /* Actualiza título */
            var titleEl = document.getElementById('map-title');
            if (titleEl) titleEl.textContent = L_t.title;

            /* Reconstruye el control de capas */
            layerControl.remove();
            layerControl = L.control.layers({}, buildLayerControl()).addTo(map);

            /* Regenera los popups con el nuevo idioma */
            refreshPopups();

            /* Actualiza idioma HTML */
            document.documentElement.lang = currentLang;
            if(window.updateMuniPlaceholder)window.updateMuniPlaceholder();
        });

        /* También escucha mensajes postMessage desde el iframe padre */
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'setLang') {
                var newLang = e.data.lang;
                if (!T[newLang] || newLang === currentLang) return;
                currentLang = newLang;
                L_t = T[currentLang] || T.es;
                var titleEl = document.getElementById('map-title');
                if (titleEl) titleEl.textContent = L_t.title;
                layerControl.remove();
                layerControl = L.control.layers({}, buildLayerControl()).addTo(map);
                refreshPopups();
                document.documentElement.lang = currentLang;
            if(window.updateMuniPlaceholder)window.updateMuniPlaceholder();
            }
        });

        </script>
    </body>
